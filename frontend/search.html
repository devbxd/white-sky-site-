<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Flights — White Sky</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="assets/main.js"></script>
</head>
<body>

  <nav id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="assets/logo.png" alt="White Sky Travel Agency" class="nav-logo-img" />
      </a>
      <ul class="nav-links">
        <li><a href="index.html#destinations">Destinations</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="https://wa.me/96500000000" target="_blank" class="nav-whatsapp">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </a></li>
        <li><a href="search.html" class="nav-cta">New Search</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <h1>Search Flights</h1>
    <p>Find the best flight for your journey</p>
  </div>

  <!-- SEARCH FORM -->
  <div class="search-form-section">
    <form class="search-form" onsubmit="searchFlights(event)">
      <div class="form-row">
        <div class="form-field" style="flex:0.4">
          <label>Trip Type</label>
          <select id="trip-type">
            <option value="one-way">One Way</option>
            <option value="round-trip">Round Trip</option>
            <option value="open-jaw">Open Jaw</option>
          </select>
        </div>

        <!-- FROM city -->
        <div class="form-field" style="position:relative">
          <label>From</label>
          <input type="text" id="s-from" placeholder="City or airport…" autocomplete="off"
            oninput="acSearch(this,'s-from-list','s-from-code')" required />
          <div class="autocomplete-list" id="s-from-list"></div>
          <input type="hidden" id="s-from-code" />
        </div>

        <!-- TO city -->
        <div class="form-field" style="position:relative">
          <label>To</label>
          <input type="text" id="s-to" placeholder="City or airport…" autocomplete="off"
            oninput="acSearch(this,'s-to-list','s-to-code')" required />
          <div class="autocomplete-list" id="s-to-list"></div>
          <input type="hidden" id="s-to-code" />
        </div>

        <div class="form-field">
          <label>Departure Date</label>
          <input type="date" id="s-date" required />
        </div>
        <div class="form-field" id="return-date-field" style="display:none">
          <label>Return Date</label>
          <input type="date" id="s-return" />
        </div>

        <!-- Open Jaw fields -->
        <div id="open-jaw-fields" style="display:none;flex:1;gap:16px;display:none">
          <div class="form-field" style="position:relative">
            <label>Return From</label>
            <input type="text" id="s-from2" placeholder="City or airport…" autocomplete="off"
              oninput="acSearch(this,'s-from2-list','s-from2-code')" />
            <div class="autocomplete-list" id="s-from2-list"></div>
            <input type="hidden" id="s-from2-code" />
          </div>
          <div class="form-field">
            <label>Return Date</label>
            <input type="date" id="s-return2" />
          </div>
        </div>
        <div class="form-field" style="flex:0.4">
          <label>Adults</label>
          <select id="s-pax">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
          </select>
        </div>
        <div class="form-field" style="flex:0.4">
          <label>Children (2-11)</label>
          <select id="s-children">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>
        <div class="form-field" style="flex:0.5">
          <label>Class</label>
          <select id="s-class">
            <option value="ECONOMY">Economy</option>
            <option value="PREMIUM_ECONOMY">Premium Economy</option>
            <option value="BUSINESS">Business</option>
            <option value="FIRST">First</option>
          </select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button type="submit" class="search-btn" id="search-btn">🔍 Search Flights</button>
      </div>
    </form>
  </div>

  <!-- RESULTS -->
  <!-- FILTERS & SORT -->
  <div id="filter-bar" style="display:none;background:var(--navy-mid);border-bottom:1px solid var(--border);padding:16px 40px">
    <div style="max-width:1100px;margin:0 auto;display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey)">Sort by:</span>
      <button class="filter-btn active" onclick="sortFlights('price')">💰 Price</button>
      <button class="filter-btn" onclick="sortFlights('duration')">⏱ Duration</button>
      <button class="filter-btn" onclick="sortFlights('departure')">🕐 Departure</button>
      <div style="width:1px;height:24px;background:var(--border);margin:0 8px"></div>
      <span style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey)">Stops:</span>
      <button class="filter-btn active" onclick="filterStops('all')">All</button>
      <button class="filter-btn" onclick="filterStops(0)">Nonstop</button>
      <button class="filter-btn" onclick="filterStops(1)">1 stop</button>
    </div>
  </div>

  <div class="results-section" id="results-container">
    <p style="color:var(--grey);font-size:14px">Enter your search criteria above to find available flights.</p>
  </div>

  <script>
    const API = 'http://localhost:3001';

    // ── Local airport database ──
    // ── Init from URL params ──
    document.addEventListener('DOMContentLoaded', () => {
      const p = new URLSearchParams(window.location.search);

      if (p.get('fromCity')) document.getElementById('s-from').value = p.get('fromCity');
      if (p.get('from'))     document.getElementById('s-from-code').value = p.get('from');
      if (p.get('toCity'))   document.getElementById('s-to').value = p.get('toCity');
      if (p.get('to'))       document.getElementById('s-to-code').value = p.get('to');
      if (p.get('date'))     document.getElementById('s-date').value = p.get('date');
      if (p.get('pax'))      document.getElementById('s-pax').value = p.get('pax');

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const minDate = tomorrow.toISOString().split('T')[0];
      document.getElementById('s-date').min   = minDate;
      document.getElementById('s-return').min = minDate;

      document.getElementById('trip-type').addEventListener('change', e => {
        const val = e.target.value;
        document.getElementById('return-date-field').style.display =
          val === 'round-trip' ? 'flex' : 'none';
        document.getElementById('open-jaw-fields').style.display =
          val === 'open-jaw' ? 'flex' : 'none';
      });

      document.addEventListener('click', e => {
        document.querySelectorAll('.autocomplete-list').forEach(l => {
          if (!l.contains(e.target)) l.style.display = 'none';
        });
      });

      if (p.get('from') && p.get('to') && p.get('date')) searchFlights();
    });

    // ── Autocomplete (local, instant) ──
    function acSearch(input, listId, codeId) {
      const query   = input.value.trim();
      const list    = document.getElementById(listId);
      const results = searchAirports(query);

      if (!results.length) { list.innerHTML = ''; list.style.display = 'none'; return; }

      list.innerHTML = results.map(a => `
        <div class="ac-item" onclick="pickAirport('${a.iata}','${a.city}, ${a.country} (${a.iata})','${input.id}','${listId}','${codeId}')">
          <span class="ac-iata">${a.iata}</span>
          <span class="ac-name">${a.city} — ${a.name}, ${a.country}</span>
        </div>`).join('');
      list.style.display = 'block';
    }

    function pickAirport(iata, label, inputId, listId, codeId) {
      document.getElementById(inputId).value = label;
      document.getElementById(codeId).value  = iata;
      document.getElementById(listId).style.display = 'none';
    }

    // ── Search flights ──
    async function searchFlights(e) {
      if (e) e.preventDefault();

      const fromCode = document.getElementById('s-from-code').value.trim().toUpperCase();
      const toCode   = document.getElementById('s-to-code').value.trim().toUpperCase();
      const date     = document.getElementById('s-date').value;
      const pax      = document.getElementById('s-pax').value;
      const children = document.getElementById('s-children').value;
      const cabinClass  = document.getElementById('s-class').value;
      const tripType    = document.getElementById('trip-type').value;
      const returnDate  = document.getElementById('s-return').value;
      const fromCity    = document.getElementById('s-from').value;
      const toCity      = document.getElementById('s-to').value;
      const from2Code   = document.getElementById('s-from2-code')?.value.trim().toUpperCase();
      const from2City   = document.getElementById('s-from2')?.value;
      const returnDate2 = document.getElementById('s-return2')?.value;

      if (!fromCode || !toCode) {
        showToast('Please select cities from the dropdown suggestions.', 'error');
        return;
      }
      if (!date) {
        showToast('Please select a departure date.', 'error');
        return;
      }
      if (tripType === 'open-jaw' && !from2Code) {
        showToast('Please select the return departure city for Open Jaw.', 'error');
        return;
      }

      const btn = document.getElementById('search-btn');
      btn.disabled = true;
      btn.textContent = 'Searching…';

      const container = document.getElementById('results-container');
      container.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Searching for the best available flights…</p>
        </div>`;

      try {
        const params = new URLSearchParams({
          from: fromCode, to: toCode, date, adults: pax, children, cabinClass,
          ...(tripType === 'round-trip' && returnDate ? { returnDate } : {}),
          ...(tripType === 'open-jaw' && from2Code ? { tripType: 'open-jaw', from2: from2Code, returnDate: returnDate2 } : {})
        });

        const res  = await fetch(`${API}/api/flights?${params}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Server error');

        // For open jaw, also fetch return leg
        let allFlights = data.flights || [];
        let returnFlights = [];

        if (tripType === 'open-jaw' && from2Code) {
          const params2 = new URLSearchParams({
            from: from2Code, to: fromCode, date: returnDate2 || date, adults: pax, children, cabinClass
          });
          const res2  = await fetch(`${API}/api/flights?${params2}`);
          const data2 = await res2.json();
          returnFlights = data2.flights || [];
        }

        renderResults(allFlights, { from: fromCode, to: toCode, fromCity, toCity, date, pax, children, cabinClass, tripType, from2Code, from2City, returnDate2, returnFlights });
      } catch (err) {
        container.innerHTML = `
          <div class="no-results">
            <p style="font-size:32px;margin-bottom:16px">✈️</p>
            <p style="margin-bottom:8px">No flights found or service temporarily unavailable.</p>
            <p style="font-size:12px;color:var(--grey)">${err.message}</p>
          </div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 Search Flights';
      }
    }

    // ── Global state for sort/filter ──
    let allFlightsGlobal = [];
    let currentSort = 'price';
    let currentStops = 'all';

    // ── Render results ──
    function renderResults(flights, params) {
      const container = document.getElementById('results-container');

      if (!flights || !flights.length) {
        container.innerHTML = `
          <div class="no-results">
            <p style="font-size:32px;margin-bottom:16px">😔</p>
            <p>No flights available for this route on these dates.</p>
            <p style="font-size:13px;color:var(--grey);margin-top:8px">Try different dates or nearby airports.</p>
          </div>`;
        return;
      }

      const isOpenJaw = params.tripType === 'open-jaw';

      // Store globally for sort/filter
      allFlightsGlobal = flights;
      window._lastParams = params;
      document.getElementById('filter-bar').style.display = 'block';

      if (isOpenJaw) {
        container.innerHTML = `<h2 class="results-header">✈ Outbound — ${params.fromCity || params.from} → ${params.toCity || params.to}</h2>`;
      } else {
        container.innerHTML = `<h2 class="results-header">${flights.length} flight(s) found — ${params.fromCity || params.from} → ${params.toCity || params.to}</h2>`;
      }

      renderFlightCards(flights, params);
    }

    function renderFlightCards(flights, params) {
      const isOpenJaw = params.tripType === 'open-jaw';
      const container = document.getElementById('results-container');
      // Remove old cards but keep header
      const header = container.querySelector('.results-header');
      container.innerHTML = '';
      if (header) container.appendChild(header);

      flights.forEach(f => {
        const seg0    = f.itineraries[0].segments[0];
        const lastSeg = f.itineraries[0].segments.at(-1);
        const depTime = formatTime(seg0.departure.at);
        const arrTime = formatTime(lastSeg.arrival.at);
        const dur     = formatDuration(f.itineraries[0].duration);
        const stops   = f.itineraries[0].segments.length - 1;
        const priceKWD = parseFloat(f.price.total).toFixed(0);
        const curr     = 'KWD';
        const totalPax = parseInt(params.pax) + parseInt(params.children || 0);
        const paxLabel = parseInt(params.children) > 0
          ? `${params.pax} adult(s) · ${params.children} child(ren)`
          : `${params.pax} adult(s)`;

        const card = document.createElement('div');
        card.className = 'flight-card';
        card.innerHTML = `
          <div>
            <div class="flight-time">${depTime}</div>
            <div class="flight-airport">${seg0.departure.iataCode}</div>
            <div class="flight-city">${formatDate(seg0.departure.at)}</div>
          </div>
          <div class="flight-duration-block">
            <div class="flight-line">
              <div class="flight-line-dot"></div>
              <div class="flight-line-bar"></div>
              <span>✈</span>
              <div class="flight-line-bar" style="background:linear-gradient(90deg,rgba(91,164,212,0.3),var(--sky))"></div>
              <div class="flight-line-dot"></div>
            </div>
            <div class="flight-duration">${dur}</div>
            <div class="flight-stops">${stops === 0 ? 'Nonstop' : stops + ' stop(s)'}</div>
            <div class="airline-badge" style="display:flex;align-items:center;gap:6px;justify-content:center;margin-top:4px">
              <img src="${airlineLogo(seg0.carrierCode)}" alt="${seg0.carrierCode}" style="height:18px;width:auto;object-fit:contain" onerror="this.style.display='none'" />
              <span>${seg0.carrierName || seg0.carrierCode} · ${seg0.number}</span>
            </div>
            ${seg0.airplane ? `<div style="font-size:10px;color:var(--grey);margin-top:2px">${seg0.airplane}</div>` : ''}
          </div>
          <div>
            <div class="flight-time">${arrTime}</div>
            <div class="flight-airport">${lastSeg.arrival.iataCode}</div>
            <div class="flight-city">${formatDate(lastSeg.arrival.at)}</div>
          </div>
          <div class="flight-price-block">
            <div class="flight-price">${priceKWD} <small style="font-size:16px">KWD</small></div>
            <div class="flight-price-sub">${paxLabel}</div>
            <button class="select-btn" onclick='selectFlight(${JSON.stringify(f).replace(/'/g,"&#39;")}, ${JSON.stringify(params).replace(/'/g,"&#39;")})'>
              Select this flight →
            </button>
          </div>`;
        container.appendChild(card);
      });

      // Open Jaw — show return leg flights
      if (isOpenJaw && params.returnFlights && params.returnFlights.length) {
        const returnHeader = document.createElement('h2');
        returnHeader.className = 'results-header';
        returnHeader.style.marginTop = '40px';
        returnHeader.innerHTML = `↩ Return — ${params.from2City || params.from2Code} → ${params.fromCity || params.from}`;
        container.appendChild(returnHeader);

        params.returnFlights.forEach(f => {
          const seg0    = f.itineraries[0].segments[0];
          const lastSeg = f.itineraries[0].segments.at(-1);
          const depTime = formatTime(seg0.departure.at);
          const arrTime = formatTime(lastSeg.arrival.at);
          const dur     = formatDuration(f.itineraries[0].duration);
          const stops   = f.itineraries[0].segments.length - 1;
          const price   = parseFloat(f.price.total).toFixed(0);
          const paxLabel = parseInt(params.children) > 0
            ? `${params.pax} adult(s) · ${params.children} child(ren)`
            : `${params.pax} adult(s)`;

          const card2 = document.createElement('div');
          card2.className = 'flight-card';
          card2.innerHTML = `
            <div>
              <div class="flight-time">${depTime}</div>
              <div class="flight-airport">${seg0.departure.iataCode}</div>
              <div class="flight-city">${formatDate(seg0.departure.at)}</div>
            </div>
            <div class="flight-duration-block">
              <div class="flight-line">
                <div class="flight-line-dot"></div>
                <div class="flight-line-bar"></div>
                <span>✈</span>
                <div class="flight-line-bar" style="background:linear-gradient(90deg,rgba(91,164,212,0.3),var(--sky))"></div>
                <div class="flight-line-dot"></div>
              </div>
              <div class="flight-duration">${dur}</div>
              <div class="flight-stops">${stops === 0 ? 'Nonstop' : stops + ' stop(s)'}</div>
              <div class="airline-badge">${seg0.carrierCode} · ${seg0.number}</div>
            </div>
            <div>
              <div class="flight-time">${arrTime}</div>
              <div class="flight-airport">${lastSeg.arrival.iataCode}</div>
              <div class="flight-city">${formatDate(lastSeg.arrival.at)}</div>
            </div>
            <div class="flight-price-block">
              <div class="flight-price">${price} <small style="font-size:16px">KWD</small></div>
              <div class="flight-price-sub">${paxLabel}</div>
              <button class="select-btn" onclick='selectFlight(${JSON.stringify(f).replace(/'/g,"&#39;")}, ${JSON.stringify({...params, isReturn: true}).replace(/'/g,"&#39;")})'>
                Select return →
              </button>
            </div>`;
          container.appendChild(card2);
        });
      }
    }

    // Airline logo URLs from Google
    function airlineLogo(code) {
      return `https://www.gstatic.com/flights/airline_logos/70px/${code}.png`;
    }

    function sortFlights(by) {
      currentSort = by;
      document.querySelectorAll('.filter-btn').forEach(b => {
        if (['💰 Price','⏱ Duration','🕐 Departure'].some(t => b.textContent.includes(t.slice(2))))
          b.classList.remove('active');
      });
      event.target.classList.add('active');
      renderSorted();
    }

    function filterStops(stops) {
      currentStops = stops;
      document.querySelectorAll('.filter-btn').forEach(b => {
        if (['All','Nonstop','1 stop'].includes(b.textContent))
          b.classList.remove('active');
      });
      event.target.classList.add('active');
      renderSorted();
    }

    function renderSorted() {
      let flights = [...allFlightsGlobal];
      // Filter stops
      if (currentStops !== 'all') {
        flights = flights.filter(f => (f.itineraries[0].segments.length - 1) === currentStops);
      }
      // Sort
      if (currentSort === 'price') flights.sort((a,b) => parseFloat(a.price.total) - parseFloat(b.price.total));
      if (currentSort === 'duration') flights.sort((a,b) => {
        const durA = a.itineraries[0].duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
        const durB = b.itineraries[0].duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
        return (parseInt(durA[1]||0)*60 + parseInt(durA[2]||0)) - (parseInt(durB[1]||0)*60 + parseInt(durB[2]||0));
      });
      if (currentSort === 'departure') flights.sort((a,b) => new Date(a.itineraries[0].segments[0].departure.at) - new Date(b.itineraries[0].segments[0].departure.at));

      renderFlightCards(flights, window._lastParams);
    }

    function selectFlight(flight, params) {
      sessionStorage.setItem('selectedFlight', JSON.stringify(flight));
      sessionStorage.setItem('searchParams',   JSON.stringify(params));
      window.location.href = 'booking.html';
    }

    function formatTime(d) { return new Date(d).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
    function formatDate(d) { return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); }
    function formatDuration(iso) {
      const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
      return `${m[1] || 0}h ${(m[2] || '0').padStart(2,'0')}m`;
    }
    function showToast(msg, type = 'info') {
      let t = document.querySelector('.toast');
      if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
      t.textContent = msg; t.className = `toast ${type}`;
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => t.classList.remove('show'), 4000);
    }
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (nav) nav.style.background = window.scrollY > 50 ? 'rgba(13,31,53,0.98)' : 'rgba(13,31,53,0.85)';
    });
  </script>
</body>
</html>
